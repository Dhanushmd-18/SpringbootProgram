<!DOCTYPE html>
<html>
<head>
    <title>Simple Landing Page</title>

    <style>

        body{
            margin:0;
            font-family: Arial, sans-serif;
        }

        /* Header */
        header{
            background:#333;
            color:white;
            display:flex;
            justify-content:space-between;
            padding:15px 40px;
        }

        header h2{
            margin:0;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-size:16px;
        }

        /* Hero Section */

        .hero{
            height:90vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            background:linear-gradient(to right,#4facfe,#00f2fe);
            color:white;
        }

        .hero h1{
            font-size:50px;
        }

        .hero p{
            font-size:20px;
        }

        .btn{
            margin-top:20px;
            padding:12px 25px;
            background:white;
            color:#333;
            border:none;
            font-size:18px;
            cursor:pointer;
            border-radius:5px;
        }

        .btn:hover{
            background:#ddd;
        }

        /* Footer */

        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
        }

    </style>

</head>

<body>

<header>

    <h2>MyWebsite</h2>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

</header>


<section class="hero">

    <h1>Welcome to My Website</h1>
    <p>This is a simple landing page using HTML and CSS</p>

    <button class="btn">Get Started</button>

</section>


<footer>

    <p>© 2026 MyWebsite | All Rights Reserved</p>

</footer>


</body>
</html>
